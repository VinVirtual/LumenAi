included:
  - App
  - Packages
  - Widgets
  - NotificationService
  - Intents

excluded:
  - .build
  - Packages/*/.build
  - DerivedData

disabled_rules:
  - todo
  - line_length
  - identifier_name

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - force_unwrapping
  - implicit_return
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - sorted_imports
  - toggle_bool

line_length:
  warning: 120
  ignores_comments: true

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 600
  error: 1000

cyclomatic_complexity:
  warning: 12
  error: 20

reporter: "xcode"
